<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="skelBg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </radialGradient>
    <linearGradient id="boneGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ddd8cc"/>
      <stop offset="100%" stop-color="#998877"/>
    </linearGradient>
    <filter id="skelGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="skelFaint">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="200" height="200" fill="url(#skelBg)"/>
  <!-- Faint green ambient -->
  <circle cx="100" cy="90" r="60" fill="#33ff66" opacity="0.03"/>
  <!-- Tattered cape -->
  <path d="M60,110 Q55,140 50,185 Q70,175 85,185 Q95,170 100,185 Q105,170 115,185 Q130,175 150,185 Q145,140 140,110Z" fill="#222233" opacity="0.7"/>
  <path d="M62,115 Q58,142 52,180" stroke="#333344" stroke-width="0.5" opacity="0.5"/>
  <path d="M138,115 Q142,142 148,180" stroke="#333344" stroke-width="0.5" opacity="0.5"/>
  <!-- Ribcage -->
  <path d="M80,120 Q100,115 120,120" fill="none" stroke="url(#boneGrad)" stroke-width="2.5"/>
  <path d="M82,128 Q100,123 118,128" fill="none" stroke="url(#boneGrad)" stroke-width="2.5"/>
  <path d="M84,136 Q100,131 116,136" fill="none" stroke="url(#boneGrad)" stroke-width="2.5"/>
  <path d="M86,144 Q100,139 114,144" fill="none" stroke="url(#boneGrad)" stroke-width="2"/>
  <!-- Spine -->
  <line x1="100" y1="110" x2="100" y2="160" stroke="url(#boneGrad)" stroke-width="3"/>
  <!-- Shoulder bones -->
  <path d="M75,112 Q100,105 125,112" fill="none" stroke="url(#boneGrad)" stroke-width="3"/>
  <circle cx="75" cy="112" r="4" fill="#ccbb99"/>
  <circle cx="125" cy="112" r="4" fill="#ccbb99"/>
  <!-- Arms -->
  <line x1="72" y1="114" x2="55" y2="155" stroke="url(#boneGrad)" stroke-width="2.5"/>
  <line x1="128" y1="114" x2="145" y2="155" stroke="url(#boneGrad)" stroke-width="2.5"/>
  <!-- Sword in right hand -->
  <line x1="145" y1="155" x2="160" y2="80" stroke="#8899aa" stroke-width="2.5"/>
  <line x1="160" y1="80" x2="162" y2="72" stroke="#aabbcc" stroke-width="2"/>
  <!-- Sword crossguard -->
  <line x1="155" y1="82" x2="165" y2="78" stroke="#887744" stroke-width="2.5"/>
  <!-- Skull -->
  <ellipse cx="100" cy="72" rx="24" ry="28" fill="url(#boneGrad)"/>
  <!-- Skull shape details -->
  <path d="M76,72 Q76,48 100,44 Q124,48 124,72 Q124,92 112,100 Q100,105 88,100 Q76,92 76,72Z" fill="url(#boneGrad)"/>
  <!-- Cheekbones -->
  <path d="M80,80 Q82,85 88,88" fill="none" stroke="#aa9977" stroke-width="1.5"/>
  <path d="M120,80 Q118,85 112,88" fill="none" stroke="#aa9977" stroke-width="1.5"/>
  <!-- Eye sockets -->
  <ellipse cx="90" cy="72" rx="9" ry="10" fill="#111118"/>
  <ellipse cx="110" cy="72" rx="9" ry="10" fill="#111118"/>
  <!-- Glowing eyes -->
  <ellipse cx="90" cy="72" rx="4" ry="5" fill="#44ff88" filter="url(#skelGlow)"/>
  <ellipse cx="110" cy="72" rx="4" ry="5" fill="#44ff88" filter="url(#skelGlow)"/>
  <ellipse cx="90" cy="71" rx="2" ry="2.5" fill="#aaffcc"/>
  <ellipse cx="110" cy="71" rx="2" ry="2.5" fill="#aaffcc"/>
  <!-- Nose hole -->
  <path d="M97,80 L100,85 L103,80" fill="#332" stroke="none"/>
  <!-- Teeth -->
  <rect x="88" y="92" width="4" height="5" rx="1" fill="#ccbb99"/>
  <rect x="93" y="92" width="4" height="5" rx="1" fill="#ccbb99"/>
  <rect x="98" y="92" width="4" height="5" rx="1" fill="#ccbb99"/>
  <rect x="103" y="92" width="4" height="5" rx="1" fill="#ccbb99"/>
  <rect x="108" y="92" width="4" height="5" rx="1" fill="#ccbb99"/>
  <!-- Jaw line -->
  <path d="M82,92 Q100,102 118,92" fill="none" stroke="#aa9977" stroke-width="1.5"/>
  <!-- Crack on skull -->
  <path d="M95,50 L92,58 L96,62 L93,68" fill="none" stroke="#887766" stroke-width="1"/>
  <!-- Border -->
  <rect x="2" y="2" width="196" height="196" rx="8" fill="none" stroke="#44ff88" stroke-width="1.5" opacity="0.2"/>
</svg>